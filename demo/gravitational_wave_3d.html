<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>引力波 3D · 传播 + 完整椭圆挤压 · 可旋转视角</title>
<style>
  :root { --panel:#111726cc; --line:#26324a; --txt:#e2e9f7; --dim:#8a99b5; --accent:#3ad0c4; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; overflow:hidden; background:#04050b; color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif; }
  #app { position:fixed; inset:0; }
  #loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    color:var(--dim); font-size:14px; }
  .panel { position:fixed; top:14px; right:14px; width:270px; background:var(--panel);
    backdrop-filter:blur(8px); border:1px solid var(--line); border-radius:12px; padding:15px; }
  h1 { font-size:15px; margin:0 0 4px; }
  .sub { font-size:11.5px; color:var(--dim); margin:0 0 12px; line-height:1.55; }
  .grp { margin:11px 0; }
  .grp label { display:block; font-size:11.5px; color:var(--dim); margin-bottom:5px; }
  .modes { display:flex; gap:6px; flex-wrap:wrap; }
  button { background:#1b2536; color:var(--txt); border:1px solid var(--line);
    padding:6px 9px; border-radius:8px; font-size:11.5px; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.on { background:var(--accent); color:#03110f; border-color:var(--accent); font-weight:600; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .hint { font-size:11px; color:var(--dim); line-height:1.6; border-top:1px solid var(--line);
    padding-top:10px; margin-top:12px; }
  .tag { position:fixed; left:14px; bottom:12px; font-size:11.5px; color:var(--dim); }
</style>
</head>
<body>
<div id="app"></div>
<div id="loading">正在加载 three.js …（此页需要联网；若长时间空白请改用 2D 版 gravitational_wave.html）</div>

<div class="panel">
  <h1>引力波 3D</h1>
  <p class="sub">质点环沿 <b style="color:#ffd27f">z 轴</b>(波传播方向)堆叠。
    <b>拖动旋转</b>视角:侧看=传播,正对 z 轴看=完整椭圆挤压。滚轮缩放。</p>

  <div class="grp">
    <label>波源 / 偏振</label>
    <div class="modes">
      <button id="mPlus" class="on">＋</button>
      <button id="mCross">×</button>
      <button id="mBinary">🌀 双星旋进</button>
    </div>
  </div>
  <div class="grp">
    <label>振幅(极度夸大) = <span id="aV">0.35</span></label>
    <input type="range" id="amp" min="0.05" max="0.6" step="0.01" value="0.35">
  </div>
  <div class="grp" id="freqGrp">
    <label>频率 = <span id="fV">0.5</span></label>
    <input type="range" id="freq" min="0.1" max="1.2" step="0.05" value="0.5">
  </div>
  <div class="grp">
    <label>波长 λ = <span id="lV">30</span></label>
    <input type="range" id="lam" min="14" max="60" step="2" value="30">
  </div>
  <div class="grp"><button id="pause">⏸ 暂停</button> <button id="view">📐 正对 z 轴</button></div>

  <div class="hint">3D 里传播与完整椭圆挤压<b>同时</b>可见,不用二选一。
    ＋和×两种偏振差 45°(张量波特征)。双星旋进=频率振幅飙升的啁啾,末端并合。</div>
</div>
<div class="tag">鼠标拖动=旋转 · 滚轮=缩放 · 右键拖=平移</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

document.getElementById('loading').remove();

const app=document.getElementById('app');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x04050b);
const camera=new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(60,38,72);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
app.appendChild(renderer.domElement);

const controls=new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08;

scene.add(new THREE.AmbientLight(0x88aabb,0.7));
const pl=new THREE.PointLight(0xffffff,1.1); pl.position.set(60,80,80); scene.add(pl);

// 传播轴箭头 (z)
scene.add(new THREE.ArrowHelper(new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,-46), 100, 0xffd27f, 8, 5));

// ---- 质点:沿 z 堆叠的环 ----
const NZ=16, RINGN=[6,12,18], zStep=6;      // 每层三圈半径
const restPos=[];  // {x,y,z}
for(let iz=0;iz<NZ;iz++){
  const z=(iz-(NZ-1)/2)*zStep;
  for(const R of RINGN){ const n=Math.max(8,Math.round(R*1.6));
    for(let i=0;i<n;i++){ const a=2*Math.PI*i/n; restPos.push({x:R*Math.cos(a), y:R*Math.sin(a), z}); } }
}
const COUNT=restPos.length;
const geo=new THREE.SphereGeometry(0.7,10,10);
const mat=new THREE.MeshStandardMaterial({color:0x3ad0c4, emissive:0x0a3f3a, roughness:0.4, metalness:0.1});
const mesh=new THREE.InstancedMesh(geo,mat,COUNT);
scene.add(mesh);
const dummy=new THREE.Object3D();

// 参考(未形变)环，淡色线框
const refMat=new THREE.LineBasicMaterial({color:0x3a4763, transparent:true, opacity:0.35});
for(let iz=0;iz<NZ;iz++){ const z=(iz-(NZ-1)/2)*zStep;
  for(const R of RINGN){ const pts=[];
    for(let i=0;i<=48;i++){ const a=2*Math.PI*i/48; pts.push(new THREE.Vector3(R*Math.cos(a),R*Math.sin(a),z)); }
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), refMat)); } }

// ---- 波参数 ----
let mode='plus', running=true, amp=0.35, freq=0.5, lambda=30, phi=0, tau=0;
function pol(theta,A){
  if(mode==='cross') return [0, A*Math.cos(theta)];
  if(mode==='binary') return [A*Math.cos(theta), A*Math.sin(theta)];
  return [A*Math.cos(theta), 0];
}
function binaryState(dt){ tau+=dt*0.16; if(tau>1.15)tau=0;
  if(tau<0.92) return {f:0.3+2.6*Math.pow(tau,3), a:0.06+0.4*tau*tau};
  return {f:3.0, a:0.46*Math.exp(-(tau-0.92)*22)}; }

let lastT=performance.now();
function animate(now){
  const dt=Math.min(0.05,(now-lastT)/1000); lastT=now;
  let A=amp,f=freq;
  if(mode==='binary'){ const b=binaryState(running?dt:0); A=b.a; f=b.f; }
  if(running) phi += 2*Math.PI*f*dt;
  const k=2*Math.PI/lambda;

  for(let i=0;i<COUNT;i++){ const p=restPos[i];
    const [hp,hc]=pol(k*p.z - phi, A);          // 沿 +z 传播
    const dx=0.5*(hp*p.x+hc*p.y), dy=0.5*(hc*p.x-hp*p.y);   // 横向 x-y 形变
    dummy.position.set(p.x+dx, p.y+dy, p.z);
    dummy.updateMatrix(); mesh.setMatrixAt(i,dummy.matrix);
  }
  mesh.instanceMatrix.needsUpdate=true;

  controls.update();
  renderer.render(scene,camera);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ---- 控件 ----
function setMode(m,id){ mode=m; phi=0; tau=0;
  ['mPlus','mCross','mBinary'].forEach(x=>document.getElementById(x).classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.getElementById('freqGrp').style.opacity=(m==='binary')?0.35:1; }
document.getElementById('mPlus').onclick=()=>setMode('plus','mPlus');
document.getElementById('mCross').onclick=()=>setMode('cross','mCross');
document.getElementById('mBinary').onclick=()=>setMode('binary','mBinary');

const ampEl=document.getElementById('amp'),aV=document.getElementById('aV');
ampEl.oninput=()=>{amp=+ampEl.value;aV.textContent=amp.toFixed(2);};
const fEl=document.getElementById('freq'),fV=document.getElementById('fV');
fEl.oninput=()=>{freq=+fEl.value;fV.textContent=freq.toFixed(2);};
const lEl=document.getElementById('lam'),lV=document.getElementById('lV');
lEl.oninput=()=>{lambda=+lEl.value;lV.textContent=lambda;};
document.getElementById('pause').onclick=e=>{running=!running;e.target.textContent=running?'⏸ 暂停':'▶ 继续';};
document.getElementById('view').onclick=()=>{ camera.position.set(0,0,95); controls.target.set(0,0,0); };

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); });
</script>
</body>
</html>
